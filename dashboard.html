<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlantMyTree Dashboard</title>

<style>
:root {
  --bg: #020617;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.1);
  --text: #e5e7eb;
  --muted: #94a3b8;
  --green: #22c55e;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI'; }

body {
  background: radial-gradient(circle at 20% 20%, #1e293b, #020617);
  color: var(--text);
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width:220px;
  height:100vh;
  padding:20px;
  border-right:1px solid var(--border);
}

/* MAIN */
.main { flex:1; padding:30px; }

/* TOPBAR */
.topbar {
  display:flex;
  justify-content:space-between;
  margin-bottom:30px;
}

.logout {
  background:#ef4444;
  padding:10px 16px;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* CARDS */
.cards {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  margin-bottom:30px;
}

.card {
  background:var(--card);
  padding:20px;
  border-radius:12px;
}

/* TABLE */
.table {
  background:var(--card);
  padding:20px;
  border-radius:12px;
}

.table table { width:100%; }

.table td, .table th {
  padding:10px;
  border-bottom:1px solid var(--border);
}

/* CTA */
.cta {
  margin-top:30px;
  padding:20px;
  background:linear-gradient(135deg,#16a34a,#22c55e);
  border-radius:12px;
  text-align:center;
}

.cta button {
  margin-top:10px;
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>🌱 PlantMyTree</h3>
</div>

<div class="main">

<div class="topbar">
  <h2 id="welcome">Welcome</h2>
  <button class="logout" id="logoutBtn">Logout</button>
</div>

<div class="cards">
  <div class="card"><h4>Payments</h4><p id="payments">0</p></div>
  <div class="card"><h4>Trees</h4><p id="trees">0</p></div>
  <div class="card"><h4>Invested</h4><p id="invested">₹0</p></div>
  <div class="card"><h4>CO₂</h4><p id="co2">0 kg</p></div>
</div>

<div class="table">
  <h3>Transactions</h3>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Trees</th>
        <th>Amount</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="cta">
  <h3>Grow your green impact 🌍</h3>
  <button onclick="startPayment()">Sponsor Trees 🌱</button>
</div>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js";

const supabase = createClient(
  "https://xveskrtmkajnjerfomcw.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2ZXNrcnRta2FqbmplcmZvbWN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5Mjk2MzIsImV4cCI6MjA4OTUwNTYzMn0.5AY3hOV1ht5lS9qASXoLIR51vpy2KyW7yZNxt0pCuvs"
);

// AUTH
const { data: { user } } = await supabase.auth.getUser();

if (!user) location.href = "login.html";

// NAME
const name =
  user.user_metadata?.full_name ||
  user.email?.split("@")[0] ||
  "User";

document.getElementById("welcome").innerText = "Welcome " + name + " 🌱";

// LOGOUT
document.getElementById("logoutBtn").onclick = async () => {
  await supabase.auth.signOut();
  location.href = "login.html";
};

// FETCH DATA
const { data: transactions, error } = await supabase
  .from("transactions")
  .select("*")
  .order("created_at", { ascending: false });

// SAFE GUARD
if (error) console.error(error);

let totalTrees = 0;
let totalAmount = 0;

if (transactions && transactions.length > 0) {

  transactions.forEach(tx => {

    totalTrees += tx.trees || 0;
    totalAmount += tx.amount || 0;

    const row = `
      <tr>
        <td>${new Date(tx.created_at).toLocaleDateString()}</td>
        <td>${tx.trees}</td>
        <td>₹${tx.amount}</td>
      </tr>
    `;

    document.getElementById("tableBody").innerHTML += row;
  });

}

// METRICS
document.getElementById("payments").innerText = transactions?.length || 0;
document.getElementById("trees").innerText = totalTrees;
document.getElementById("invested").innerText = "₹" + totalAmount;
document.getElementById("co2").innerText = (totalTrees * 2) + " kg";

// ADD DATA
window.addDummyTransaction = async function () {

  const { data: { user } } = await supabase.auth.getUser();

  const { error } = await supabase
    .from("transactions")
    .insert([
      {
        user_id: user.id,
        trees: 5,
        amount: 50
      }
    ]);

  if (error) alert(error.message);
  else location.reload();
};

window.startPayment = async function () {

  const { data: { user } } = await supabase.auth.getUser();

  const options = {
    key: "rzp_test_STEKWMQQbBWWSY", // ⚠️ replace
    amount: 5000, // ₹50 (in paise)
    currency: "INR",
    name: "PlantMyTree",
    description: "Sponsor Trees",
    
    handler: async function (response) {

      // SAVE TO DATABASE
      const { error } = await supabase
        .from("transactions")
        .insert([
          {
            user_id: user.id,
            trees: 5,
            amount: 50
          }
        ]);

      if (error) {
        alert("Payment done, but saving failed");
      } else {
        alert("Payment successful 🌱");
        location.reload();
      }
    },

    prefill: {
      email: user.email
    },

    theme: {
      color: "#16a34a"
    }
  };

  const rzp = new Razorpay(options);
  rzp.open();
};

</script>

</body>
</html>
